<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Agencia IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1e1e3a, #2d1b69);
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 2px 20px rgba(0,0,0,0.4);
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        .status-text {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Stats cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, #1e1e3a, #252540);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(139, 92, 246, 0.5);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 0.3rem;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 0.6rem 1rem;
            background: #1e1e3a;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #a78bfa;
        }

        .search-input::placeholder { color: #64748b; }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #6d28d9, #4338ca);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #1e1e3a;
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .btn-secondary:hover {
            border-color: #a78bfa;
            background: rgba(139, 92, 246, 0.1);
        }

        /* Table */
        .table-wrapper {
            background: #1a1a2e;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #1e1e3a, #2d1b69);
        }

        th {
            padding: 1rem 1.2rem;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #a78bfa;
            cursor: pointer;
            user-select: none;
        }

        th:hover { color: #c4b5fd; }

        td {
            padding: 0.9rem 1.2rem;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        tr:hover td { background: rgba(139, 92, 246, 0.05); }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .badge-pending {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-contacted {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .badge-closed {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .btn-view {
            padding: 0.3rem 0.8rem;
            background: rgba(139, 92, 246, 0.15);
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-view:hover {
            background: rgba(139, 92, 246, 0.3);
            border-color: #a78bfa;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #64748b;
        }

        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-state p { font-size: 1rem; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #1a1a2e;
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 16px;
            padding: 2rem;
            max-width: 640px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal h2 {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: #a78bfa;
            padding-right: 2rem;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: #64748b;
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }

        .modal-close:hover { color: #e2e8f0; }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .detail-item label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 0.3rem;
        }

        .detail-item p {
            font-size: 0.9rem;
            color: #e2e8f0;
            word-break: break-word;
        }

        .detail-item.full { grid-column: 1 / -1; }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.3rem;
        }

        .tag {
            padding: 0.2rem 0.6rem;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            font-size: 0.8rem;
            color: #a78bfa;
        }

        /* Status selector in modal */
        .status-select {
            background: #0f0f1a;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 6px;
            color: #e2e8f0;
            padding: 0.3rem 0.6rem;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #64748b;
            font-size: 0.95rem;
        }

        /* Notification toast */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: #1e1e3a;
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 10px;
            padding: 0.8rem 1.2rem;
            font-size: 0.9rem;
            color: #e2e8f0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 640px) {
            .detail-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
            .search-input { min-width: unset; width: 100%; }
            td:nth-child(3), th:nth-child(3) { display: none; }
        }
    </style>
</head>
<body>

<header>
    <h1>⚡ Admin Panel — Agencia IA</h1>
    <div class="header-meta">
        <div class="status-dot"></div>
        <span class="status-text">Sistema activo</span>
    </div>
</header>

<main>
    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-label">Total Leads</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-pending">0</div>
            <div class="stat-label">Pendientes</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-contacted">0</div>
            <div class="stat-label">Contactados</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-closed">0</div>
            <div class="stat-label">Cerrados</div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <input
            type="text"
            class="search-input"
            id="search"
            placeholder="Buscar por empresa, email o industria..."
            oninput="filterLeads()"
        >
        <button class="btn btn-secondary" onclick="loadLeads()">↻ Actualizar</button>
        <button class="btn btn-primary" onclick="exportCSV()">⬇ Exportar CSV</button>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th onclick="sortBy('businessName')">Empresa ↕</th>
                    <th onclick="sortBy('email')">Email ↕</th>
                    <th onclick="sortBy('industry')">Industria ↕</th>
                    <th onclick="sortBy('budget')">Presupuesto ↕</th>
                    <th onclick="sortBy('status')">Estado ↕</th>
                    <th onclick="sortBy('createdAt')">Fecha ↕</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="leads-tbody">
                <tr><td colspan="7"><div class="loading">Cargando leads...</div></td></tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal()">×</button>
        <h2 id="modal-title">Detalle del Lead</h2>
        <div id="modal-body"></div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    let allLeads = [];
    let sortKey = 'createdAt';
    let sortDir = -1;

    async function loadLeads() {
        try {
            const res = await fetch('/api/admin/leads');
            allLeads = await res.json();
            renderStats();
            renderTable(allLeads);
        } catch (e) {
            document.getElementById('leads-tbody').innerHTML =
                '<tr><td colspan="7"><div class="empty-state"><div class="icon">⚠️</div><p>Error al cargar. ¿Está el servidor activo?</p></div></td></tr>';
        }
    }

    function renderStats() {
        document.getElementById('stat-total').textContent = allLeads.length;
        document.getElementById('stat-pending').textContent = allLeads.filter(l => l.status === 'pending').length;
        document.getElementById('stat-contacted').textContent = allLeads.filter(l => l.status === 'contacted').length;
        document.getElementById('stat-closed').textContent = allLeads.filter(l => l.status === 'closed').length;
    }

    function renderTable(leads) {
        const tbody = document.getElementById('leads-tbody');
        if (!leads.length) {
            tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="icon">📭</div><p>No hay leads todavía. Cuando alguien envíe el formulario, aparecerá aquí.</p></div></td></tr>';
            return;
        }

        tbody.innerHTML = leads.map(lead => `
            <tr>
                <td><strong>${esc(lead.businessName || '—')}</strong></td>
                <td>${esc(lead.email || '—')}</td>
                <td>${esc(lead.industry || '—')}</td>
                <td>${esc(lead.budget || '—')}</td>
                <td><span class="badge badge-${lead.status || 'pending'}">${statusLabel(lead.status)}</span></td>
                <td>${formatDate(lead.createdAt)}</td>
                <td><button class="btn-view" onclick="openModal(${lead.id})">Ver</button></td>
            </tr>
        `).join('');
    }

    function filterLeads() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = allLeads.filter(l =>
            (l.businessName || '').toLowerCase().includes(q) ||
            (l.email || '').toLowerCase().includes(q) ||
            (l.industry || '').toLowerCase().includes(q)
        );
        renderTable(filtered);
    }

    function sortBy(key) {
        if (sortKey === key) sortDir *= -1;
        else { sortKey = key; sortDir = 1; }
        allLeads.sort((a, b) => {
            const av = a[key] || '';
            const bv = b[key] || '';
            return av < bv ? -sortDir : av > bv ? sortDir : 0;
        });
        filterLeads();
    }

    async function openModal(id) {
        try {
            const res = await fetch(`/api/admin/leads/${id}`);
            const lead = await res.json();

            document.getElementById('modal-title').textContent = `Lead: ${lead.businessName || id}`;
            document.getElementById('modal-body').innerHTML = `
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Empresa</label>
                        <p>${esc(lead.businessName || '—')}</p>
                    </div>
                    <div class="detail-item">
                        <label>Email</label>
                        <p>${esc(lead.email || '—')}</p>
                    </div>
                    <div class="detail-item">
                        <label>Industria</label>
                        <p>${esc(lead.industry || '—')}</p>
                    </div>
                    <div class="detail-item">
                        <label>Presupuesto</label>
                        <p>${esc(lead.budget || '—')}</p>
                    </div>
                    <div class="detail-item">
                        <label>Volumen</label>
                        <p>${esc(lead.volume || '—')}</p>
                    </div>
                    <div class="detail-item">
                        <label>Fecha</label>
                        <p>${formatDate(lead.createdAt)}</p>
                    </div>
                    <div class="detail-item full">
                        <label>Soluciones solicitadas</label>
                        <div class="tag-list">
                            ${(lead.solutionTypes || []).map(s => `<span class="tag">${esc(s)}</span>`).join('')}
                        </div>
                    </div>
                    <div class="detail-item full">
                        <label>Objetivos</label>
                        <div class="tag-list">
                            ${(lead.goals || []).map(g => `<span class="tag">${esc(g)}</span>`).join('')}
                        </div>
                    </div>
                    <div class="detail-item full">
                        <label>Descripción</label>
                        <p>${esc(lead.businessDescription || '—')}</p>
                    </div>
                    <div class="detail-item full">
                        <label>Info adicional</label>
                        <p>${esc(lead.additionalInfo || '—')}</p>
                    </div>
                    <div class="detail-item">
                        <label>Estado</label>
                        <select class="status-select" onchange="updateStatus(${lead.id}, this.value)">
                            <option value="pending" ${lead.status === 'pending' ? 'selected' : ''}>Pendiente</option>
                            <option value="contacted" ${lead.status === 'contacted' ? 'selected' : ''}>Contactado</option>
                            <option value="closed" ${lead.status === 'closed' ? 'selected' : ''}>Cerrado</option>
                        </select>
                    </div>
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        } catch (e) {
            showToast('Error al cargar el lead');
        }
    }

    function updateStatus(id, newStatus) {
        const lead = allLeads.find(l => l.id === id);
        if (lead) {
            lead.status = newStatus;
            renderStats();
            filterLeads();
            showToast('Estado actualizado');
        }
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    function exportCSV() {
        if (!allLeads.length) { showToast('No hay leads para exportar'); return; }
        const headers = ['ID', 'Empresa', 'Email', 'Industria', 'Presupuesto', 'Volumen', 'Estado', 'Fecha', 'Soluciones', 'Objetivos'];
        const rows = allLeads.map(l => [
            l.id, l.businessName, l.email, l.industry, l.budget, l.volume,
            l.status, l.createdAt,
            (l.solutionTypes || []).join('; '),
            (l.goals || []).join('; ')
        ].map(v => `"${(v || '').toString().replace(/"/g, '""')}"`));

        const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `leads-${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('CSV descargado');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function statusLabel(s) {
        return { pending: 'Pendiente', contacted: 'Contactado', closed: 'Cerrado' }[s] || 'Pendiente';
    }

    function formatDate(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function esc(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Close modal on overlay click
    document.getElementById('modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
    });

    // Initial load
    loadLeads();
    // Auto-refresh every 30 seconds
    setInterval(loadLeads, 30000);
</script>
</body>
</html>
